server:
  port: 8089


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_users
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  config:
    import: optional:configserver:http://localhost:8085

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: "http://localhost:9411/api/v2/spans"