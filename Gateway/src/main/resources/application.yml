spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
        pool:
          type: elastic
          max-idle-time: 15s

      routes:
        - id: USERSERVICE
          uri: lb://USERSERVICE
          predicates:
            - Path=/api/v1/users, /api/v1/users/**
          filters:
            - AuthenticationFilter
            - AddRequestHeader=X-INTERNAL-KEY, MY_SECRET_KEY

        - id: HOTELSERVICE
          uri: lb://HOTELSERVICE
          predicates:
            - Path=/api/v1/hotels, /api/v1/hotels/**, /api/v1/staffs/**
          filters:
            - AuthenticationFilter
            - AddRequestHeader=X-INTERNAL-KEY, MY_SECRET_KEY

        - id: RATINGSERVICE
          uri: lb://RATINGSERVICE
          predicates:
            - Path=/api/v1/ratings, /api/v1/ratings/**
          filters:
            - AuthenticationFilter
            - AddRequestHeader=X-INTERNAL-KEY, MY_SECRET_KEY

        - id: AUTHSERVICE
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/login, /login/**, /api/users, /api/users/**

        - id: BOOKINGSERVICE
          uri: lb://BOOKINGSERVICE
          predicates:
            - Path=/api/v1/bookings, /api/v1/bookings/**, /api/v1/admin, /api/v1/admin/**
          filters:
            - AuthenticationFilter
            - AddRequestHeader=X-INTERNAL-KEY, MY_SECRET_KEY

  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost

resilience4j:
  retry:
    instances:
      authServiceRetry:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - com.example.gateway.exception.InvalidTokenException

  circuitbreaker:
    instances:
      authServiceCB:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - com.example.gateway.exception.InvalidTokenException

# Tracing
management:
  tracing:
    sampling:
      probability: 1.0   # 1.0 = capture everything; use 0.1 in high-traffic prod
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"