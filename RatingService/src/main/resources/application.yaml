spring:
  application:
    name: RatingService
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: Microservices-hotel


#Importing data from the Config Server
  config:
    import: optional:configserver:http://localhost:8085

server:
  port: 9094


management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
