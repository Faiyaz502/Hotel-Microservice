server:
  port: 8088

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/MicroService_Booking
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: optional:configserver:http://localhost:8085

management:
    endpoints:
      web:
        exposure:
          include: health, info, prometheus